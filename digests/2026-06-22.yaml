  - url: https://www.marble.onl/posts/cancel_claude.html
    title: There is minimal downside to switching to open models
    score: 355
    comment_cnt: 291
    comment_url: https://news.ycombinator.com/item?id=48622518
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 作者认为，尽管使用开放权重的大语言模型在性能、API质量和隐私信任方面仍不及Claude和GPT等专有模型，但差距已大幅缩小，类似于Linux最终赶上Windows的过程。由于Claude推出身份验证机制以及模型限制不断增加，作者计划转向开放模型，预计仅会出现短期生产力下降，而非早年使用开源替代方案时那种难以承受的代价。
    content_file: there-is-minimal-downside-to-switching-to-open-models.md
    summary: The author argues that while using open-weight LLMs still carries a professional
      penalty compared to proprietary models like Claude and GPT—in terms of performance,
      API quality, and privacy trust—the gap has narrowed significantly, much like
      how Linux eventually caught up to Windows. Prompted by Claude's ID verification
      rollout and increasing model restrictions, the author plans to shift toward
      open models, expecting only a short-term productivity hit rather than the deal-breaking
      sacrifices that once accompanied open-source alternatives.
  - url: https://github.com/openai/codex/issues/28224
    title: Codex logging bug may write TBs to local SSDs
    score: 352
    comment_cnt: 193
    comment_url: https://news.ycombinator.com/item?id=48626930
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: OpenAI 的 Codex CLI 工具因全局 TRACE 级别日志默认设置，每年向本地 SQLite 反馈日志数据库写入约 640
      TB 数据，可能在不到一年内耗尽消费级 SSD 的保修写入寿命。根本原因是无差别地持久化依赖库噪声、原始 WebSocket/SSE 载荷和镜像的 OpenTelemetry
      事件，建议的修复方案是收紧默认日志过滤器而非完全禁用反馈日志。
    content_file: codex-logging-bug-may-write-tbs-to-local-ssds.md
    summary: OpenAI's Codex CLI tool writes approximately 640 TB/year to a local SQLite
      feedback log database due to a global TRACE-level logging default, which can
      exhaust a consumer SSD's warranted write endurance in under a year. The root
      cause is indiscriminate persistence of dependency noise, raw websocket/SSE payloads,
      and mirrored OpenTelemetry events, and the proposed fix is narrowing default
      log filters rather than disabling feedback logs entirely.
  - url: https://alexkritchevsky.com/2026/05/25/everything-is-logarithms.html
    title: Everything is logarithms
    score: 290
    comment_cnt: 65
    comment_url: https://news.ycombinator.com/item?id=48622626
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 这篇数学文章探讨了"无底数对数"的概念——将 log N 视为一个抽象代数对象，类似于几何向量，其中选择底数（如 2 或 e）等价于选择坐标系或度量单位。作者揭示了对数换底公式与向量投影/坐标变换之间的深层结构类比，论证对数的行为类似于相对于任意原点定义的乘法向量。
    content_file: everything-is-logarithms.md
    summary: This mathematical essay explores the concept of a "baseless logarithm"
      — treating log N as an abstract algebraic object analogous to a geometric vector,
      where choosing a base (like 2 or e) is equivalent to choosing a coordinate system
      or unit of measurement. The author draws deep structural parallels between logarithmic
      change-of-base formulas and vector projection/coordinate transformations, arguing
      that logarithms behave like multiplicative vectors defined relative to an arbitrary
      origin.
