    summary_zh: JSON-LD（JSON 链接数据）是一种嵌入网页 `<head>` 标签中的结构化数据格式，帮助搜索引擎和大语言模型爬虫理解网站语义，从而获得更丰富的链接预览和更好的搜索排名。本指南介绍了关键的
      Schema.org 节点类型——WebSite、WebPage、Person 和 ProfilePage——并提供了个人网站的实用示例，重点说明了用于跨平台消歧的
      `sameAs` 属性以及用于跨页面合并节点数据的 `@id` 标识符。
    content_file: json-ld-explained-for-personal-websites.md
    summary: JSON-LD (JSON Linked Data) is a structured data format embedded in webpage
      `<head>` tags that helps search engines and LLM crawlers understand site semantics,
      enabling richer previews and better search rankings. The guide covers key Schema.org
      node types—WebSite, WebPage, Person, and ProfilePage—with practical examples
      for personal websites, emphasizing properties like `sameAs` for cross-platform
      disambiguation and `@id` for merging node data across pages.
