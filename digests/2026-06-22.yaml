      gray matter reductions and activation of parental caregiving networks—driven
      by caregiving itself rather than pregnancy biology. Up to one in 10 fathers
      experience postnatal depression or anxiety, yet screening tools and support
      systems remain largely designed for mothers, prompting calls to restructure
      maternal support into broader parental systems.
