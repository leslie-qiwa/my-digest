      or government ID for "age verification" online, but these systems function as
      universal identity tracking that endangers everyone's privacy while failing
      to actually protect children. The author argues that people should refuse to
      comply, since these verification systems only work with near-universal participation
      and the biometric data they collect cannot be changed if breached.
