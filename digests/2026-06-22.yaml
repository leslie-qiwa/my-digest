    content_file: deno-desktop.md
    summary: Deno 2.9.0 introduces `deno desktop`, a new command that turns any Deno
      or TypeScript project—including framework apps like Next.js, Astro, and SvelteKit—into
      a self-contained desktop application with cross-platform compilation, built-in
      auto-update, and in-process webview bindings. It offers a lightweight alternative
      to Electron and Tauri by defaulting to the OS-native webview for small binaries
      while optionally bundling Chromium (CEF) for consistent cross-platform rendering.
