    summary_zh: Deno 2.9.0 推出了 `deno desktop` 命令，可将任何 Deno 或 TypeScript 项目（包括 Next.js、Astro、SvelteKit
      等框架应用）打包为自包含的桌面应用程序，支持跨平台编译、内置自动更新和进程内 webview 绑定。它默认使用操作系统原生 webview 以减小二进制体积，同时可选捆绑
