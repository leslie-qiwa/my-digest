      Connect UK, providing investors with a single real-time source of prices and
      trading activity across the UK bond market—making it the first country outside
      North America to do so. The launch follows December 2025 transparency rule changes
      that boosted real-time corporate bond trade reporting from under 5% to over
      75%, with the tape now covering 98% of in-scope bond trading under a 5-year
      FCA-supervised contract.
