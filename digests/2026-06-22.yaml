    tags: []
    summary_zh: 英国推出了首个债券综合报价系统（consolidated tape），由ETS Connect UK运营，使投资者首次能够通过单一实时数据源获取英国债券市场的价格和交易信息，成为北美以外首个推出此类系统的国家。该系统的上线得益于2025年12月生效的透明度规则改革，企业债实时报告比例从不足5%提升至75%以上，目前覆盖98%的合规债券交易，由FCA在五年合同期内进行监管。
