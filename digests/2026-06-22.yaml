    summary_zh: 科学研究表明，成为父亲会引起可测量的大脑变化——包括灰质减少和亲职照护神经网络的激活——这些变化源于照护行为本身，而非妊娠的生理过程。多达十分之一的父亲会经历产后抑郁或焦虑，但筛查工具和支持体系仍主要面向母亲，研究者呼吁将母亲支持系统重构为涵盖父母双方的育儿支持体系。
