    summary: Fugu-Ultra, an AI system that orchestrates multiple strong models, outperformed
      individual frontier models across six diverse benchmarks — including autonomous
      ML training optimization, classical Japanese reading-order recovery, Rubik's
      Cube solving, CAD mechanical design, blindfold chess, and stock trading — demonstrating
      that multi-model orchestration can surpass any single frontier model on agentic
      tasks. Notably, in the AutoResearch experiment it achieved the best mean validation
      BPB (0.9774) over 123 autonomous experiments on a single H100 GPU, and in the
      kana letter reading-order task it scored NED 0.80 versus 0.24 for the nearest
      competitor.
  - url: https://www.mooreds.com/wordpress/archives/3518
    title: Ask for no, don't ask for yes (2022)
    score: 182
    comment_cnt: 88
    comment_url: https://news.ycombinator.com/item?id=48622234
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 文章提倡一种"行动优先"的习惯：与其向上级请求许可（寻求"同意"），不如告知你的计划并设定一个近期截止日期，邀请对方提出异议（寻求"反对"）。这种方式能保持工作推进节奏，减轻忙碌管理者的决策负担，同时让你在解决问题的过程中仍能保持上级知情并允许其在必要时介入。
    content_file: ask-for-no-don-t-ask-for-yes-2022.md
    summary: The article advocates for a "bias for action" habit where, instead of
      asking your boss for permission (seeking a "yes"), you inform them of your plan
      with a near-term deadline and invite them to object (asking for a "no"). This
      approach keeps momentum, reduces the decision burden on busy managers, and lets
      you solve problems while still keeping leadership informed and able to weigh
      in.
