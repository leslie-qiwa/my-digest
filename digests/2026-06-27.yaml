  - url: https://physics.stackexchange.com/questions/535/why-does-kinetic-energy-increase-quadratically-not-linearly-with-speed
    title: Why does kinetic energy increase quadratically, not linearly, with speed?
      (2011)
    score: 137
    comment_cnt: 52
    comment_url: https://news.ycombinator.com/item?id=48692946
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 作者提出两个直观论证，说明动能为何与速度的平方成正比（$KE\propto v^2$），二者都建立在能量守恒且可在动能与势能之间相互转化这一前提上。第一个论证借助弹簧将两个箱子推开并结合伽利略不变性，第二个则仅依赖恒定重力场中的自由落体运动学，而无需预设功或
      $mgh$ 公式。
    content_file: why-does-kinetic-energy-increase-quadratically-not-linearly.md
    summary: The author offers two intuitive arguments for why kinetic energy is proportional
      to the square of velocity ($KE\propto v^2$), grounding both in the premise that
      energy is conserved and convertible between kinetic and potential forms. The
      first uses a spring pushing two boxes apart combined with Galilean invariance,
      while the second relies only on free-fall kinematics in a constant gravitational
      field without presupposing work or the formula $mgh$.
