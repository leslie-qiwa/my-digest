    summary: As AI systems increasingly produce publishable, Olympiad-level, and even
      original mathematical results, the article asks what remains meaningful about
      being a mathematician—arguing the field's deepest value lies in the human joy
      and understanding gained from the long struggle toward a proof. It traces AI's
      growing role, from the computer-aided four-color theorem to LLMs paired with
      proof assistants that now automate formalization and autonomously tackle unsolved
      problems.
