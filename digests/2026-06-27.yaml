    summary: 'The Fintech Engineering Handbook is a living reference describing the
      core software patterns for systems where money is the primary concern, organized
      around three principles: no invented data, no lost data, and no trust. It covers
      how to represent money correctly—precision handling, rounding strategies, currency
      modeling, and FX rates—since errors at the representation layer propagate to
      every layer above.'
