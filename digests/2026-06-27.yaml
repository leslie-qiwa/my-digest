  - url: https://dervis.de/physical/
    title: If you can't hold it, you don't own it
    score: 89
    comment_cnt: 53
    comment_url: https://news.ycombinator.com/item?id=48697335
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 当消费者"购买"数字电影、游戏、图书或音乐时，通常获得的是可撤销且与账户绑定的许可，而非真正的所有权，因此当商店关闭、失去版权或更改政策时，购买内容可能被移除。从亚马逊、索尼到Disney+、Netflix和苹果，大量下架、诉讼和资料库移除事件表明，与可转售的实体媒介不同，数字内容可能在不退款的情况下消失。
    content_file: if-you-can-t-hold-it-you-don-t-own-it.md
    summary: When consumers "buy" digital movies, games, books, or music, they typically
      receive a revocable, account-locked license rather than true ownership, leaving
      purchases vulnerable to removal when stores close, lose rights, or change policies.
      A long history of delistings, lawsuits, and library removals—from Amazon and
      Sony to Disney+, Netflix, and Apple—shows that digital content can vanish without
      refunds, unlike resellable physical media.
