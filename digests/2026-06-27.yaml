    summary_zh: 一张在推特上流传的图表显示,在 Artificial Analysis 智能指数上,开放权重与闭源大语言模型之间的差距将在 2026
      年 12 月 3 日前后缩小为零,暗示届时会有前沿开源模型发布。然而,将该分析扩展到全部 18 个基准后发现,平均差距几乎保持平稳,略低于 5 个月,而所谓的趋近主要由编程类基准驱动,而非全面追赶。
    content_file: the-gap-between-open-weights-llms-and-closed-source-llms.md
    summary: A viral plot suggested that the gap between open-weight and closed-source
      LLMs on the Artificial Analysis Intelligence Index will shrink to zero around
      December 3rd 2026, implying a frontier open-source release by then. However,
      repeating the analysis across all 18 benchmarks shows the average gap staying
      nearly flat at just under 5 months, with most of the apparent convergence driven
      by coding benchmarks rather than a broad catch-up.
