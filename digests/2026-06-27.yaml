    summary_zh: Gossamer 是一门带有 Rust 风味的系统编程语言（Apache-2.0 许可，v0.19.1 预 1.0 版），具备前向管道、默认不可变、基于
      M:N 调度器的真正 goroutine，以及通过确定性引用计数加 arena 区域实现的无停顿内存管理——没有借用检查器、async 或垃圾回收器。它既能通过字节码虚拟机和
      REPL 快速迭代，也能借助 LLVM 编译为单一、无依赖的原生二进制文件，并配有丰富的标准库和可在浏览器中运行的示例。
    content_file: gossamer-a-rust-flavoured-language-with-real-goroutines-and.md
    summary: Gossamer is a Rust-flavoured systems programming language (Apache-2.0,
      v0.19.1 pre-1.0) featuring forward pipes, immutability by default, real goroutines
      on an M:N scheduler, and pause-free memory via deterministic reference counting
      plus arena regions—no borrow checker, async, or garbage collector. It runs from
      a bytecode VM and REPL for fast iteration or compiles to a single dependency-free
      native binary via LLVM, with a broad standard library and browser-runnable samples.
