    summary_zh: 《金融科技工程手册》是一份持续更新的参考资料，描述了以资金为核心的软件系统的关键工程模式，并围绕三大原则展开：不凭空创造数据、不丢失数据、不信任。手册涵盖如何正确表示货币——包括精度处理、舍入策略、货币建模和外汇汇率，因为表示层的错误会传递到其上的每一层。
