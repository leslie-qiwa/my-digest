    summary_zh: 索尼正在通知 PlayStation 商店用户，他们"购买"的 551 部由 StudioCanal 发行的电影和电视剧——包括《终结者2》《全面回忆》和《杀出个黎明》——将于
      9 月 1 日因授权协议到期而从其库中移除，且未提及任何退款或补偿。此事再次表明，数字"购买"实质上只是可被随时收回的临时租赁，这一风险同样适用于游戏。
    content_file: playstation-is-deleting-551-movies-from-customers-accounts.md
    summary: Sony is notifying PlayStation Store users that 551 StudioCanal-distributed
      movies and TV shows they "purchased"—including Terminator 2, Total Recall, and
      From Dusk Till Dawn—will be removed from their libraries on September 1 due
      to expiring licensing agreements, with no mention of refunds or compensation.
      The case again highlights that digital "purchases" are effectively temporary
      rentals that can be revoked at any time, a risk that also applies to games.
