  - url: https://golangweekly.com/link/186191/rss
    title: How Go Builds Stack Traces
    summary: 'Go''s stack traces work through cooperation between the compiler/linker
      and the runtime: the linker bakes a table (`.gopclntab`) into the binary recording
      each function''s frame size, and at crash time the runtime''s unwinder uses
      that table plus the CPU''s return-address convention to reconstruct the call
      chain frame by frame from just a program counter and stack pointer.


      The crash path begins when an unrecovered `gopanic` calls `fatalpanic`, which
      switches to a separate stack and freezes all goroutines so their stacks stay
      stable, then walks each frame by looking up its size in the linker table, computing
      where the caller''s return address sits, and repeating until the stack is exhausted.'
    score: 0
    tags: []
    source: internals-for-interns.com
    summary_zh: 本文从 `panic()` 出发，完整追踪了 Go 栈追踪的生成过程：运行时先切换到调度器栈并冻结所有 goroutine，再由展开器（unwinder）利用当前
      PC 和 SP 逐帧回溯调用链。展开的关键在于编译器/链接器在构建时将每个函数的帧大小等元数据写入 `.gopclntab` 表，运行时据此计算出每一帧的返回地址和调用者栈指针，从而在没有帧链表的情况下完整重建调用栈。
    content_file: how-go-builds-stack-traces.md
  - url: https://golangweekly.com/link/186198/rss
    title: 'Finding a Needle in a 4 GB Haystack: From 0.75 GB/s to 49 GB/s'
    summary: The article benchmarks 13 variants of scanning a 4 GiB mostly-zero file
      in Go on Linux, progressing from a naive `os.ReadFile` loop at 0.75 GB/s to
      49 GB/s (a 66× speedup) by systematically eliminating bottlenecks across allocations,
      syscall overhead, page faults, parallelism, and SIMD (including Go 1.26's new
      `simd/archsimd` package for AVX-512). Each variant isolates a specific layer
      of the stack — Go runtime, kernel, page cache, memory hierarchy — revealing
      that raw throughput on a simple problem is governed less by algorithmic cleverness
      and more by how efficiently data moves through hardware.
    score: 0
    tags: []
    source: segflow.github.io
    summary_zh: 本文通过一个在4 GiB全零文件中查找唯一非零int64的Go编程任务，系统性地探索了从朴素逐字节遍历到mmap、多核并行、以及Go
      1.26新增的SIMD/AVX-512等十三种优化变体，逐层揭示了Go运行时、系统调用、页面缓存和内存层次结构的性能瓶颈。最终实现了从0.75 GB/s到49
      GB/s的66倍加速，清晰展示了每一层优化（消除拷贝、减少系统调用、利用多核并行、SIMD向量化）各自突破的性能墙及其原因。
    content_file: finding-a-needle-in-a-4-gb-haystack-from-0-75-gb-s-to-49-gb.md
