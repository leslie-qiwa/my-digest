    summary_zh: 挪威政府已拨款86亿挪威克朗，计划于2027年初开工建造世界首条全尺寸船舶隧道——斯塔德船舶隧道，以帮助船只安全绕过挪威西部危险的斯塔德半岛海域。该隧道全长近2公里，采用钻孔爆破工艺在厚岩层中开凿，预计2031年建成通航，届时将缩短航程约56公里，并消除恶劣天气对船舶通行的影响。
