    tags: []
    summary_zh: 本文揭示了各国政府和企业以"保护儿童"为幌子，推动互联网实名认证和用户追踪数据库的建设，尽管早已存在零成本的RTA标签等技术方案可由父母自行管控儿童上网内容。作者警告，这一进程将从成人网站的年龄验证逐步扩展至社交媒体、银行、聊天工具等所有在线服务，最终实现政府与企业对互联网言论和用户身份的全面监控。
    content_file: think-of-the-children-how-to-force-real-id-for-all-internet.md
    summary: The article argues that age-verification laws requiring real ID for adult
      websites are not genuinely about protecting children, since simple, free technical
      solutions (like the RTA header) already exist and could be trivially re-implemented
      in browsers. Instead, the author theorizes these laws are a stepping stone toward
      mandatory real-identity tracking across all internet activity, starting with
      adult content, expanding to social media, and eventually encompassing all online
      services — benefiting governments seeking narrative control and corporations
      seeking profit from centralized user data.
  - url: https://newsletter.kentbeck.com/p/hey-n00b-we-didnt-hire-you-to-complete
    title: Hey, n00b, we didn't hire you to complete tasks
    score: 199
    comment_cnt: 115
    comment_url: https://news.ycombinator.com/item?id=48604851
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 这篇文章指出，公司招聘新人看重的不是你完成了多少任务，而是你的成长潜力和学习速度——资深工程师会据此将你归为能提升团队的A类、稳定贡献的B类或即将淘汰的C类。要成为A类，关键是从每个任务中深入学习、优化方案、简化代码、编写工具和文档，而非单纯追求关闭任务的数量。
    content_file: hey-n00b-we-didn-t-hire-you-to-complete-tasks.md
    summary: New engineers aren't valued for how many tasks they complete, but for
      how quickly they grow — seniors view their salary as an investment in future
      productivity and sort them into categories based on learning trajectory, not
      raw output. The best new hires distinguish themselves not by speed but by questioning
      tasks, simplifying designs, writing useful tools, submitting clean incremental
      diffs, and sharing what they learn — all of which take more time than the minimum
      needed to close a ticket.
