  - url: https://golangweekly.com/link/186492/rss
    title: Subtle Go Security Issues to Audit For
    summary: This follow-up blog post highlights new security footguns in Go's standard
      library, including silent integer overflow/underflow vulnerabilities in serialization
      and database drivers, and confusing hop-by-hop header handling in Go's built-in
      reverse proxy that can be exploited when both RFC 2616 and RFC 7230 are respected
      simultaneously. It also notes positive language improvements like `os.Root`
      for path traversal prevention and the cleanup of `math/rand` to eliminate insecure
      random number generation, while releasing Semgrep rules to detect these risky
      patterns.
    score: 0
    tags: []
    source: www.elttam.com
    summary_zh: 本文是一篇关于Go语言安全审计的后续博客，回顾了Go近年来在安全方面的改进（如`os.Root`防路径遍历、`math/rand`整理消除不安全随机数），并重点介绍了几类新的安全陷阱，包括Go的`int`类型在不同架构上宽度不同导致的静默整数溢出漏洞，以及标准库`httputil.ReverseProxy`同时遵守新旧RFC造成的逐跳头部处理混淆问题。作者还针对这些危险编码模式发布了相应的semgrep检测规则，旨在帮助代码审计人员发现自动化工具和AI助手难以捕捉的语言层面安全隐患。
    content_file: subtle-go-security-issues-to-audit-for.md
