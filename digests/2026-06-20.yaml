    summary: Datasette Apps is a new plugin that lets users host self-contained HTML+JavaScript
      applications inside sandboxed iframes on a Datasette instance, with the ability
      to run SQL queries against the underlying data while being locked down via iframe
      sandbox attributes and Content Security Policy headers to prevent data exfiltration.
      The concept evolved from building a Claude Artifacts-like feature for Datasette
      Agent, combining the power of a persistent relational database backend with
      vibe-coded HTML frontends to create a productive and secure platform for custom
      data-driven applications.
  - url: https://mnot.net/blog/2026/well_known_uris
    title: So You Want to Define a Well-Known URI
    score: 135
    comment_cnt: 90
    comment_url: https://news.ycombinator.com/item?id=48595331
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: Well-Known URI 最适用于客户端已知站点并需高效发现站点级信息的场景，不应仅为获取合法性或充当 URL 缩短器而滥用注册。在定义
      Well-Known URI 时，需注意发现机制中的主机名歧义、多发布者站点的内容元数据粒度权衡，以及 URL 方案声明和及时注册等实践问题。
    content_file: so-you-want-to-define-a-well-known-uri.md
    summary: Well-Known URIs are best suited for cases where a client already knows
      a site and needs to efficiently discover something site-wide, like access policies,
      rather than as a URL shortener or a way to lend legitimacy to a protocol. Designers
      should carefully consider pitfalls such as hostname discovery ambiguity, the
      limitations of centralizing content metadata on multi-publisher sites, and the
      need to explicitly enumerate applicable URL schemes and register their well-known
      location.
