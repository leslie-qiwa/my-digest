  - url: https://golangweekly.com/link/186876/rss
    title: Finding Leaked Goroutines in Go 1.27
    summary: Go 1.27 will include a built-in goroutine leak detector (`goroutineleak`
      profile) in `runtime/pprof`, designed by engineers from Uber, that uses the
      garbage collector's reachability analysis to identify goroutines provably stuck
      on channels or locks that no runnable goroutine can ever release — guaranteeing
      zero false positives unlike heuristic approaches. The new profile requires no
      new API — it registers as a standard pprof profile accessible via code, tests,
      HTTP endpoints, or `go tool pprof`, complementing Uber's existing `goleak` library
      which suits test teardown while the new profile targets live production services.
    score: 0
    tags: []
    source: rednafi.com
    summary_zh: Go 1.27 将在标准库 `runtime/pprof` 中引入基于垃圾回收器可达性证明的 goroutine 泄漏检测器，能够零误报地识别永久阻塞的
      goroutine，弥补了现有 goleak 工具在生产环境中无法区分正常等待与真正泄漏的不足。该分析器源自 Uber 团队的设计，提供代码内调用、测试集成、HTTP
      端点和 `go tool pprof` 四种使用方式，API 极简——仅新增一个名为 `goroutineleak` 的 profile，无需引入新类型或函数。
    content_file: finding-leaked-goroutines-in-go-1-27.md
  - url: https://golangweekly.com/link/186882/rss
    title: How Does struct{} Take Zero Bytes in Go?
    summary: 'Go''s `struct{}` takes zero bytes because the runtime skips allocation
      entirely — when one escapes to the heap, `mallocgc` returns a pointer to a single
      global variable (`zerobase`), so every empty struct shares the same address.
      Two gotchas: pointer comparison between empty structs is unreliable since the
      compiler may or may not alias them, and placing a `struct{}` as the last field
      in a struct adds a word of padding, quietly negating the zero-cost benefit.'
    score: 0
    tags: []
    source: www.bud1m.com
    summary_zh: Go 语言中 `struct{}` 占用零字节，其底层原理是运行时在分配时直接返回指向全局变量 `zerobase` 的指针，跳过实际内存分配，因此所有空结构体共享同一地址。使用时需注意两个陷阱：空结构体的指针比较结果不可靠，以及当
      `struct{}` 作为结构体的最后一个字段时会触发额外填充，反而增加内存占用。
    content_file: how-does-struct-take-zero-bytes-in-go.md
  - url: https://golangweekly.com/link/186887/rss
    title: 'goja: An ECMAScript/JavaScript Engine in Pure Go'
