  - url: https://overreacted.io/there-are-no-instances-in-atproto/
    title: There are no instances in ATProto
    score: 325
    comment_cnt: 191
    comment_url: https://news.ycombinator.com/item?id=48599515
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: atproto（Bluesky 的底层协议）与 Mastodon 不同，它没有"实例"的概念，因为它将数据托管与应用聚合彻底分离，类似于
      RSS 与 Google Reader 的关系。这种架构让用户可以自由更换托管服务并使用不同的应用，从而实现比联邦式社交网络更灵活、更本质的去中心化。
    content_file: there-are-no-instances-in-atproto.md
    summary: Atproto (the protocol behind Bluesky) has no "instances" because it separates
      hosting from apps — your data lives in swappable hosting, and apps merely aggregate
      from it, much like RSS readers aggregated blog posts. This fundamentally differs
      from Mastodon's federated model, where each instance bundles hosting and app
      together into isolated fiefdoms that must forward posts to each other.
  - url: https://www.eff.org/deeplinks/2026/06/new-bill-takes-aim-government-pressure-silence-lawful-online-speech
    title: A new bill takes aim at government pressure to silence lawful online speech
    score: 232
    comment_cnt: 113
    comment_url: https://news.ycombinator.com/item?id=48600950
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 美国参议员克鲁兹和怀登联合提出《JAWBONE法案》，旨在赋予公民联邦诉讼权以对抗政府官员胁迫科技平台审查受第一修正案保护言论的行为，并建立政府与平台沟通的透明度制度。电子前沿基金会（EFF）对此表示支持，同时强调需在防止政府"施压审查"与保障平台自身第一修正案编辑权利之间取得恰当平衡，以确保政府不能随意指令企业管控用户合法言论。
    content_file: a-new-bill-takes-aim-at-government-pressure-to-silence-lawfu.md
    summary: The bipartisan JAWBONE Act, introduced by Senators Cruz and Wyden, would
      create a federal cause of action against government officials who coerce private
      companies into censoring lawful, First Amendment-protected speech, while also
      establishing transparency requirements for government communications with platforms
      about user expression. EFF supports the bill but emphasizes that the law must
      carefully distinguish unconstitutional coercion from legitimate government-platform
      communication, and that platforms retain their own First Amendment right to
      independently moderate content.
  - url: https://wilsoniumite.com/2026/06/19/the-room-the-economy-cant-see/
    title: The room the economy can't see
    score: 222
    comment_cnt: 247
    comment_url: https://news.ycombinator.com/item?id=48596911
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 本文以斯德哥尔摩一个靠政府拨款维持的青少年游戏俱乐部为例，指出市场无法自发创造这类具有正外部性但无法盈利的"第三空间"，而此类公共社交场所正在大量消失。作者认为核心原因在于工资是人们获取生存资源的唯一途径，迫使人们将时间投入有偿工作而放弃探望亲人、陪伴孩子、经营社团等真正有价值但无偿的活动，经济体系在系统性地浪费人的时间却浑然不觉。
    content_file: the-room-the-economy-can-t-see.md
    summary: The article argues that many valuable social goods—like community spaces
      for teenagers, visiting grandparents, and maintaining friendships—are disappearing
      because they are unpaid activities that generate positive externalities the
      market cannot price, and labor pressure forces people to spend their time on
      paid work instead. It uses a Swedish youth gaming clubhouse funded by a government
      grant as a concrete example, then begins exploring how economies might be restructured
      to make these unpaid but genuinely valuable choices affordable, rather than
      relying solely on patchwork public funding.
