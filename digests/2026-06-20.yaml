    summary: Prylint is a Rust reimplementation of pylint that produces byte-for-byte
      identical output — including messages, line numbers, exit codes, and even pylint's
      bugs — while running 15–2300× faster (median ~85×), verified against 52 production
      codebases comprising ~65,000 Python files. It achieves this by porting pylint's
      full inference engine, config parsing, and message control logic in Rust, using
      ruff's parser to rebuild astroid's exact tree shape, and differentially testing
      every change against pinned pylint 4.0.5 to maintain perfect output fidelity.
