  - url: https://golangweekly.com/link/185924/rss
    title: Generic Methods Land in Go
    summary: This Go proposal suggests allowing concrete (non-interface) methods to
      declare their own type parameters, just like generic functions, recognizing
      that methods are useful for code organization and chaining beyond just implementing
      interfaces. Generic methods would work exactly like generic functions with receivers,
      supporting type inference and method expressions, but would not be callable
      through interfaces or reflection since interface methods cannot declare type
      parameters.
    score: 0
    tags: []
    source: github.com
    summary_zh: 该提案建议允许Go语言的具体方法像函数一样声明自己的类型参数，从而支持泛型方法，但这些泛型方法不能用于实现接口方法。这一转变的核心观点是：方法不仅仅是实现接口的手段，它们本身作为与类型关联的命名空间函数就具有独立价值，因此即使不支持泛型接口方法，泛型具体方法也值得引入。
    content_file: generic-methods-land-in-go.md
