    tags: []
    summary_zh: 作者将HTML内容的UTF-8字节编码进favicon图片的RGB像素通道中，成功将一个小型网页压缩存储在一张仅9x9像素的PNG图片里。虽然这种做法没有实际用途且仍需JavaScript引导加载器来解码，但它展示了favicon本质上只是字节数据，可以被创造性地用作微型存储介质。
