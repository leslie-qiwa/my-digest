    summary_zh: 纪录片《如何喂养独裁者》通过五位曾为金正日、萨达姆、阿明、波尔布特和皮诺切特掌勺的私人厨师的亲历讲述，揭示了独裁者餐桌背后的权力运作与人性扭曲。影片探讨了这些厨师在物质优待与道德沦丧之间的挣扎，展现了普通人如何在极权体制中既成为共谋者又沦为牺牲品。
    content_file: how-to-feed-a-dictator.md
    summary: The documentary *How to Feed a Dictator*, premiering at Tribeca and based
      on Witold Szabłowski's book, features five private chefs recounting their experiences
      cooking for infamous dictators including Pol Pot, Kim Jong-il, Idi Amin, Saddam
      Hussein, and Augusto Pinochet, revealing how proximity to power came with both
      extraordinary privilege and mortal danger. The film explores the moral compromises
      these cooks made to survive, showing how some remain loyal to their former employers
      while others are haunted by complicity, ultimately arguing that ordinary people
      help sustain dictatorships through the everyday bargain of comfort in exchange
      for silence.
  - url: https://news.ycombinator.com/item?id=48604232
    title: 'Ask HN: Will programmers write more efficient code during the memory shortage?'
    score: 135
    comment_cnt: 223
    comment_url: https://news.ycombinator.com/item?id=48604232
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 软件臃肿的根源在于开发者默认自己的程序独占资源、大型团队的子模块无节制加载、以及广告追踪脚本泛滥，而客户端优化缺乏动力，因为节省的内存只会被竞争对手的应用占用，形成公地悲剧。服务器端是内存优化最有前景的方向，因为能直接转化为成本节省，但面临二十年水平扩展惯性的阻碍，且多数优化本质上是"停止做蠢事"而非使用高级算法。
    content_file: ask-hn-will-programmers-write-more-efficient-code-during-the.md
    summary: Modern software bloat stems less from algorithmic inefficiency and more
      from organizational factors — large teams shipping dozens of submodules loaded
      regardless of need, unnecessary dependencies chosen over stdlib solutions, and
      pervasive ad/tracking scripts — because simplifying this architecture is costly
      and fragile. Client-side RAM optimization is a tragedy of the commons with no
      competitive incentive, so meaningful efficiency gains will primarily happen
      server-side where reduced memory directly cuts costs, though even there, decades
      of horizontal-scaling inertia and the expense of optimization work create significant
      resistance.
  - url: https://ianbarber.blog/2026/06/19/llms-are-complicated-now/
    title: LLMs Are Complicated Now
    score: 125
    comment_cnt: 52
    comment_url: https://news.ycombinator.com/item?id=48605355
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 现代大语言模型的架构已从早期简洁的Transformer堆叠演变得日益复杂，融入了多种注意力变体、混合专家路由和多模态编码器，其复杂程度逐渐趋近于推荐系统。面对这种复杂性，单纯依赖AI智能体自动生成优化内核并不现实，关键在于像FlexAttention那样从一开始就为可组合性而设计，使研究者能在保持性能的前提下灵活探索新架构。
    content_file: llms-are-complicated-now.md
    summary: Modern LLMs have evolved from simple, repeated Transformer blocks into
      complex architectures with numerous attention variants, mixture-of-experts routing,
      and multimodal encoders — mirroring the same complexity explosion that earlier
      hit recommendation systems. The author argues that the only sustainable path
      forward is designing for composability upfront (as FlexAttention demonstrated),
      since the tight coupling between performance optimization and research iteration
      makes it impractical to either hand-fuse or auto-generate kernels without a
      verifiable, composable baseline.
