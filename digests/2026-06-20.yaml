      RGB values, fitting 208 bytes of markup into a 9x9 PNG by treating each color
      channel as a data byte. A bootstrap JavaScript loader on the page reads the
      favicon onto a canvas, extracts the pixel data, and reconstructs the original
      HTML — making it a technically functional but entirely impractical way to serve
      a website from its own icon.
