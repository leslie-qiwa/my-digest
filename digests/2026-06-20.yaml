    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 这篇文章解释了由于屏幕技术和sRGB色域的限制，许多真实存在的颜色（尤其是青色）无法在数字设备上显示，因为要精确再现这些颜色需要"负的红色"，而这在物理上不可能实现。作者还指出，在自然界中，阳光透过落叶林层层树叶的滤光效果会产生远超屏幕色域的极致饱和绿色，这种震撼只能亲眼在户外体验。
    content_file: where-to-find-the-colors-your-screen-can-t-show-you.md
    summary: Digital screens and LED lighting cannot reproduce a large portion of
      the visible color spectrum—particularly vivid cyans and saturated greens—because
      the primary colors used in display technology (sRGB) cover only a small triangle
      of the full human color gamut. To experience these missing colors, you need
      to go outdoors into environments like deciduous forests, where sunlight filtered
      and transmitted through multiple layers of leaves produces intensely saturated
      greens and cyans that no screen can display.
