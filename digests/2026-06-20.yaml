    summary_zh: Datasette Apps 是一个新插件，允许用户在 Datasette 托管的严格沙箱 iframe 中运行自包含的 HTML+JavaScript
      应用，通过 CSP 策略和 MessageChannel 等安全机制防止数据泄露，同时支持对数据库执行只读或受控的写入 SQL 查询。该项目最初源于为
