  - url: https://golangweekly.com/link/185926/rss
    title: Migrating from Go to Rust
    summary: This article is a practical guide for backend Go developers considering
      migrating to Rust, arguing that the primary motivation isn't speed but rather
      the stronger correctness guarantees Rust provides by encoding error handling,
      nil-safety, data-race prevention, and resource lifetimes into the type system
      rather than relying on conventions and runtime checks. It compares toolchains,
      maps Go patterns to Rust equivalents, and acknowledges that while Go offers
      a gentler learning curve and faster compilation, Rust's compile-time enforcement
      eliminates entire categories of bugs that Go catches only through discipline
      or runtime detection.
    score: 0
    tags: []
    source: corrode.dev
    summary_zh: 本文探讨了从 Go 迁移到 Rust 的实际考量，指出迁移的核心动因并非性能差异，而是 Rust 通过类型系统将内存安全、错误处理和数据竞争预防等检查提升为编译期保证，从而提供更强的正确性。作者认为
      Go 的优势在于学习曲线平缓、编译速度快和生态成熟，而 Rust 以更陡的学习曲线和更慢的构建速度为代价，换取了无垃圾回收、零成本抽象和更严格的编译时检查。
    content_file: migrating-from-go-to-rust.md
  - url: https://golangweekly.com/link/185927/rss
    title: Claude as Your Performance Analysis Partner
    summary: Claude can effectively assist with Go performance analysis by identifying
      optimization opportunities in CPU profiles and assembly dumps, such as reducing
      redundant atomic operations and spotting missed compiler optimizations like
      uncached variable accesses. However, suggested optimizations require careful
      validation against real workloads, as theoretically sound changes (e.g., replacing
      two atomic ops with one wider atomic) can regress performance due to subtle
      effects like false sharing and cache-line contention.
    score: 0
    tags: []
    source: developers.redhat.com
    summary_zh: 本文探讨了利用Claude AI辅助CPU性能剖析与跟踪分析，以Go语言新型Green Tea垃圾收集器在POWER10架构上的优化为案例，展示了Claude在识别原子操作瓶颈、算术优化及汇编级代码分析方面的能力。尽管部分建议（如用Or32替代Load8+Or8）因伪共享问题导致性能回退，但Claude在深入分析汇编代码、发现编译器未执行的优化（如因原子操作阻止窥孔优化）等方面展现了显著价值，证明AI可将繁琐的性能分析工作变得高效。
    content_file: claude-as-your-performance-analysis-partner.md
  - url: https://golangweekly.com/link/185928/rss
    title: Tracing HTTP Requests with net/http/httptrace
    summary: 'Go''s `net/http/httptrace` package provides hook-based visibility into
      outgoing HTTP request phases (DNS, TCP, TLS, first byte) by attaching a `ClientTrace`
      to a `context.Context` rather than requiring an interface on the client, which
      lets traces compose naturally with middleware and concurrent requests. The article
      demonstrates two practical uses: a CLI that prints per-phase timing breakdowns
      like `curl -w`, and a reusable `RoundTripper` wrapper that automatically logs
      request timings for every call through an `http.Client`.'
    score: 0
    tags: []
    source: blainsmith.com
    summary_zh: Go 标准库的 `net/http/httptrace` 包通过将 `ClientTrace` 附加到 `context.Context`
      上，为 HTTP 请求的 DNS 解析、TCP 连接、TLS 握手等关键阶段提供了细粒度的追踪钩子，无需修改客户端接口即可实现并发安全的请求级追踪。文章演示了两个实用场景：一个类似
      `curl --trace` 的命令行耗时分析工具，以及一个可复用的 `RoundTripper` 包装器，为每个请求自动记录各阶段耗时。
    content_file: tracing-http-requests-with-net-http-httptrace.md
