    summary_zh: 自学成才的AI工程师汤姆·迪米诺声称破译了困扰语言学界一个多世纪的青铜时代米诺斯书写系统——线形文字A，认为其对应一种已消亡的闪族语言，是圣经希伯来语的前身。他借助Claude
      Code构建Python脚本对数字化语料库进行系统性假设检验，提出了40个符号的读法和408个术语的词汇表，研究成果目前正由罗格斯大学和剑桥大学的专家审阅。
    content_file: ai-engineer-claims-to-have-cracked-linear-a.md
    summary: Tom Di Mino, a self-taught AI engineer and amateur linguist, claims to
      have deciphered Linear A — a Bronze Age Minoan script that has stumped experts
      for over a century — by identifying it as an extinct Semitic language ancestral
      to Hebrew, with his key breakthrough being the decoding of a prayer verb root
      meaning "to dwell." His work, now under review by linguists at Rutgers and Cambridge,
      has produced proposed readings for 40 signs (including 13 previously unknown),
      a 408-term translated lexicon, and a draft manuscript, aided by Python tools
      he built with Claude Code to systematically analyze the digitized Linear A corpus.
