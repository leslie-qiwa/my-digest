    title: Is AI ruining our skills? Early results are in – and they're not good
    score: 199
    comment_cnt: 268
    comment_url: https://news.ycombinator.com/item?id=48601286
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 初步研究表明，对人工智能工具的依赖正在削弱医生和软件工程师等专业人员的核心技能，例如医生在使用AI辅助后，自主发现癌前病变的能力出现下降。这些发现引发了对AI工具长期影响人类专业能力的担忧，情况并不乐观。
    content_file: is-ai-ruining-our-skills-early-results-are-in-and-they-re-no.md
    summary: 'Based on the article content you provided:


      Early studies show that reliance on AI tools is degrading professional skills:
      physicians who used AI-assisted colonoscopy detection became worse at independently
      spotting pre-cancerous growths, and software engineers experienced similar declines
      in their core abilities when depending on AI coding assistants. These findings
      suggest that while AI can boost short-term performance, it risks eroding the
      foundational expertise professionals need when working without AI support —
      a pattern sometimes called "deskilling."'
