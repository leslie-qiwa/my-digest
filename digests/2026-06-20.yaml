    summary_zh: Project Valhalla 历经十年开发，其首个预览特性 JEP 401（值类与值对象）终于确认将集成到 JDK 28 中，单个
      PR 就涉及 1,816 个文件、新增超过 19.7 万行代码。该项目旨在消除 Java 中"便捷的类"与"高效的基本类型"之间的二元对立，让开发者能够编写像普通类一样可读的代码，同时获得像基本类型一样紧凑高效的内存布局，从而解决引用间接引用、缓存未命中和对象头开销等长期性能瓶颈。
    content_file: project-valhalla-explained-how-a-decade-of-work-arrives-in-j.md
    summary: 'Project Valhalla, a decade-long effort to let Java developers define
      custom types that are as memory-efficient as primitives while retaining the
      safety and readability of classes, will ship its first preview (JEP 401: Value
      Classes and Objects) in JDK 28, with a massive 197,000-line pull request now
      integrated into OpenJDK. While this milestone eliminates Java''s long-standing
      tradeoff between convenient object-oriented code and high-performance dense
      memory layouts, it remains a preview feature disabled by default and represents
      only the first phase of the full Valhalla vision.'
