      and musician, passed away on June 16, 2026; he was a pioneering video game composer
      and sound designer whose work on iconic titles like Doom, Wolfenstein 3D, and
      Duke Nukem 3D helped establish game music as a respected art form, earning him
      a Lifetime Achievement Award in 2005. He is survived by his wife Connie, sons,
      granddaughter, and extended family, and is remembered for his kindness, humor,
      creativity, and deep love of family alongside his lasting musical legacy.
  - url: https://moultano.wordpress.com/2026/06/19/where-to-find-the-colors-your-screen-cant-show-you/
