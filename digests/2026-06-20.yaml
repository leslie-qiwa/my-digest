    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 实验卫星Pulsar-0首次从太空绘制了欧洲和中东地区GPS信号干扰的全景图，其干扰范围和严重程度远超研究团队预期，近地轨道卫星的导航信号在从法国到巴基斯坦的广大区域内均受到不同程度的影响。Xona
      Space Systems计划部署300颗近地轨道卫星组成的Pulsar星座，通过发射强度提高100倍的导航信号来大幅增强抗干扰能力，预计2027年初开始提供服务。
    content_file: satellite-reveals-immense-scale-of-gps-signal-tampering.md
    summary: An experimental satellite from Xona Space Systems has mapped GPS signal
      jamming across Europe and the Middle East from space for the first time, revealing
      that interference extends far more broadly than expected — from France to Pakistan's
      borders — and degrades positioning signals even for satellites in low Earth
      orbit. Xona plans to address the problem with its upcoming Pulsar navigation
      constellation of 300 LEO satellites, which will transmit signals 100 times stronger
      than current GPS, reducing the area affected by jammers by roughly 95%, with
      initial service expected in early 2027.
