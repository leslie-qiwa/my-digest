    summary: A coalition of European open-source social platform organizations has
      issued a joint declaration committing to build a decentralized, European-owned
      social media infrastructure—spanning the Fediverse (Mastodon, PeerTube), the
      Atmosphere (Eurosky, Bluesky-based), and private messaging (Matrix, XMPP)—to
