      tools like Babel and the TypeScript compiler without any cgo dependencies. While
      significantly faster than similar Go-based JS engines like otto, it has known
      limitations including non-standard WeakMap garbage collection behavior, broken
      UTF-16 surrogate pair handling in JSON.parse, and no thread safety within a
      single runtime instance.
    score: 0
    tags: []
    source: github.com
    summary_zh: Goja 是一个用纯 Go 语言实现的 ECMAScript 5.1 引擎，注重标准合规性和性能，支持大部分 ES6 特性，能运行
      Babel 和 TypeScript 编译器等 ES5 代码。由于 Go 运行时的限制，其 WeakMap 实现和 JSON 解析存在与标准的细微差异，且单个
      Runtime 实例不支持并发访问，但纯 Go 实现使其具备跨平台构建简单、与 Go 数据交互便捷的优势。
