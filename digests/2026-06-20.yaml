    title: Ice water drowning survival of young patient (2025)
    score: 195
    comment_cnt: 129
    comment_url: https://news.ycombinator.com/item?id=48594592
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 一名8岁男孩跌入冰封池塘，水下浸没至少147分钟、体温降至7°C，经体外膜肺氧合（ECMO）复温和长期康复治疗后成功存活，创下医学文献中最长浸没时间和最低存活体温的记录。该病例表明，对于无脉搏深度低体温的儿童患者，即使心脏停搏长达2.5小时，仍应积极进行心肺复苏和体外复温，同时为神经功能未恢复者提供了通过ECMO桥接器官捐献的新思路。
    content_file: ice-water-drowning-survival-of-young-patient-2025.md
    summary: An 8-year-old boy survived after being submerged in an ice-covered pond
      for at least 147 minutes and reaching a body temperature of 7 °C (45 °F), representing
      the longest submersion time and lowest body temperature survived in medical
      literature. He was resuscitated using CPR and rewarmed with extracorporeal membrane
      oxygenation (ECMO), ultimately recovering after prolonged hospitalization and
      neurorehabilitation, extending the known limits of survivable hypothermic circulatory
      arrest.
