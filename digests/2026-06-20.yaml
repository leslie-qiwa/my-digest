      2027 and completion expected by 2031. The nearly 2km tunnel will allow ships
      to safely bypass one of Norway's most dangerous coastal stretches, eliminating
      weather-related delays caused by roughly 100 storm days per year and shortening
      journeys by about 56 kilometres.
