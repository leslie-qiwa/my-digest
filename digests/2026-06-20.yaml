  - url: https://golangweekly.com/link/186869/rss
    title: How Go Reflection Really Works
    summary: Go's `reflect` package doesn't compute type information at runtime; instead,
      the compiler serializes complete type descriptors (field names, types, struct
      tags) as static, read-only data baked into the binary at build time. When you
      call `reflect.TypeOf`, it simply reads a pointer from the interface header to
      that pre-built descriptor — making reflection essentially just pointer arithmetic
      over metadata the compiler wrote for itself.
    score: 0
    tags: []
    source: internals-for-interns.com
    summary_zh: 本文深入剖析了Go语言reflect包的底层原理：编译器在构建时将所有类型描述符（包括字段名、类型、结构体标签等元数据）作为静态只读数据烘焙进二进制文件，而reflect.TypeOf本质上只是一次指针加载，从空接口的头部读取编译器预先放置的类型指针。类型描述符采用"固定头部+按种类追加变长数据"的分层布局，编译器写入、reflect通过指针算术读取，整个反射机制并无运行时魔法，只是编译器给自己写的笔记被原样读回。
    content_file: how-go-reflection-really-works.md
