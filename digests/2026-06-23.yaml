    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 一项对6,038款LG和三星智能电视应用的扫描发现，其中2,058款内嵌了Bright Data、Massive和Honeygain/Oxylabs的住宅代理SDK，在用户不知情的情况下将第三方网络流量通过其家庭网络转发，以换取免广告体验或后台变现。与已明确禁止此类行为的亚马逊和Roku不同，LG和三星尚未出台同等公开政策，使电视用户面临本地网络被入侵的潜在风险。
    content_file: nearly-half-of-lg-smart-tv-apps-contain-residential-proxy-sd.md
    summary: A scan of 6,038 LG and Samsung smart TV apps found 2,058 containing residential
      proxy SDKs from Bright Data, Massive, and Honeygain/Oxylabs, quietly routing
      third-party internet traffic through users' home networks in exchange for ad-free
      experiences or background monetization. Unlike Amazon and Roku, which ban such
      practices, LG and Samsung have no equivalent public policy, leaving TV owners
      exposed to potential local-network intrusion if the SDK's server-side traffic
      filters fail or are abused.
