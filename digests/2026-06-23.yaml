  - url: https://role-confusion.github.io
    title: Prompt Injection as Role Confusion
    score: 171
    comment_cnt: 93
    comment_url: https://news.ycombinator.com/item?id=48631888
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 本文认为提示注入攻击之所以成功，是因为大语言模型未能正确感知角色边界——即将单一token流划分为不同信任和权限层级的标签（system、user、tool）。作者指出，理解角色感知机制而非记忆已知攻击模式才是实现稳健防御的关键，并提出了一套研究角色机制的科学议程。
    content_file: prompt-injection-as-role-confusion.md
    summary: This paper argues that prompt injection attacks succeed because LLMs
      fail to correctly perceive role boundaries — the tags (system, user, tool) that
      partition a single token stream into segments of different trust and authority.
      The authors show that understanding role perception, rather than memorizing
      known attacks, is the key to robust defenses, and they propose a research agenda
      for studying how LLMs process roles.
  - url: https://arun.is/blog/japan-symbols/
    title: Japanese symbols that speak without words
    score: 148
    comment_cnt: 65
    comment_url: https://news.ycombinator.com/item?id=48634803
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 日本拥有悠久的无文字图形符号传统——从古代的家纹到现代的驾驶员标志和公共交通标识——仅通过形状和颜色传达含义，无需任何文字。这些符号涵盖了警车和特急列车的车辆徽标、面向新手驾驶员、老年驾驶员和残障驾驶员的强制或推荐车贴，以及东京都发行的帮助标志，用于标识公共交通中有隐性健康状况的乘客。
    content_file: japanese-symbols-that-speak-without-words.md
    summary: Japan has a rich tradition of wordless graphic symbols—from ancient kamon
      crests to modern driver and transit marks—that convey meaning through shape
      and color alone, requiring no text. These symbols range from vehicle insignia
      for police and express trains to mandatory driver stickers for beginners, elderly,
      and disabled motorists, as well as the Tokyo-issued Help Mark for people with
      invisible disabilities on public transit.
  - url: https://www.crunchydata.com/blog/british-columbia-and-time-zone-changes
    title: British Columbia, Time Zones, and Postgres
    score: 127
    comment_cnt: 88
    comment_url: https://news.ycombinator.com/item?id=48634787
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 不列颠哥伦比亚省于 2026 年 3 月永久切换至全年太平洋夏令时（UTC-7），这可能导致 PostgreSQL 中以 `timestamptz`
      存储的未来预约出现静默偏差，因为该列类型存储的是 UTC 值，而插入与查询之间 tzdata 规则可能已发生变化。推荐的解决方案是双列模式——同时存储用户的本地时间、IANA
      时区名称以及由触发器计算的 UTC 列——从而确保未来的本地时间意图不受时区规则更新的影响。
    content_file: british-columbia-time-zones-and-postgres.md
    summary: British Columbia's permanent switch to year-round Pacific Daylight Time
      (UTC-7) in March 2026 can silently break future appointments stored as `timestamptz`
      in PostgreSQL, because those columns store UTC and rely on tzdata rules that
      change between insert and query time. The recommended fix is a dual-column pattern—storing
      the user's local wall-clock time, IANA timezone name, and a trigger-computed
      UTC column—so that future local intent survives timezone-rule updates.
  - url: https://lwn.net/Articles/1029767/
    title: Linux and Secure Boot certificate expiration (2025)
    score: 118
    comment_cnt: 59
    comment_url: https://news.ycombinator.com/item?id=48633941
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 微软用于签署 Linux 安全启动 shim 的 2011 年 UEFI 签名密钥将于 2026 年 9 月到期，届时在安全启动系统上进行新的
      Linux 安装将需要固件更新以添加微软 2023 年的替换密钥——而许多系统可能尚未获得甚至永远不会获得此更新。虽然已安装的发行版应能继续使用自身密钥正常启动，但此次过渡带来了重大复杂性，包括
      EFI 变量空间不足问题、至少一家制造商丢失了其平台密钥，以及首次进行的 KEK 更新流程可能被部分 BIOS 厂商错误实现。
    content_file: linux-and-secure-boot-certificate-expiration-2025.md
    summary: Microsoft's 2011 UEFI signing key used for Linux Secure Boot shim expires
      in September 2026, meaning new Linux installations on Secure Boot systems will
      require firmware updates to add Microsoft's 2023 replacement key—updates that
      many systems may not yet have or may never receive. While already-installed
      distributions should continue booting with their own keys, the transition introduces
      significant complications including EFI variable space issues, at least one
      manufacturer losing its platform key, and the first-ever KEK update process,
      which some BIOS vendors may have implemented incorrectly.
