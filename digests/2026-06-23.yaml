      and without credit. The court's notably defense-favorable analysis highlights
      the low-stakes nature of suing bloggers over incidental photo use and the continued
      erosion of statute-of-limitations defenses in online copyright law.
  - url: https://github.com/kyle-ssg/kyde
    title: 'Show HN: I rebuilt the only parts of my IDE I use, in Rust, over a weekend'
    score: 46
    comment_cnt: 72
    comment_url: https://news.ycombinator.com/item?id=48629416
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: Kyde 是一款基于 Zed 的 gpui 框架构建的开源 macOS 原生 GPU 渲染 Git 客户端与代码编辑器，在大文件上可实现
      120fps 滚动，支持并排差异对比与分块暂存、内嵌终端及 tree-sitter 语法高亮。该项目由一位自称不懂 Rust 的开发者创建，旨在为提交与差异查看工作流提供一个快速的原生替代方案，免去启动完整
      JVM IDE 的等待。
    content_file: show-hn-i-rebuilt-the-only-parts-of-my-ide-i-use-in-rust-ove.md
    summary: Kyde is a new open-source, GPU-rendered Git client and code editor for
      macOS built on Zed's gpui framework, offering 120fps scrolling on large files,
      side-by-side diffs with hunk staging, an embedded terminal, and tree-sitter
      syntax highlighting. Created by a developer who doesn't know Rust, it aims to
      be a fast, native replacement for the commit-and-diff workflow that previously
      required a full JVM-based IDE.
