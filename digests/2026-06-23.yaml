    tags: []
    summary_zh: 联邦法院以合理使用为由，判决博主Lauren Messiah胜诉——摄影公司Sokolskyfilm因其2009年博客文章中使用了一张通过Google图片搜索找到的1962年时尚照片而提起诉讼。法院的分析明显偏向被告，凸显了因博客附带使用照片而起诉的低风险本质，以及在线版权法中诉讼时效抗辩持续被削弱的趋势。
