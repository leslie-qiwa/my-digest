    summary_zh: 在俄克拉荷马州克莱尔莫,居民达伦·布兰查德因在2月17日市议会会议上就"野马项目"(一个约300英亩的数据中心园区)发言略微超过三分钟公众评论时限,而被以非法侵入罪逮捕。执法记录仪画面(收费从1750美元降至120美元后才获得)拍下了他请求提交文件时警官下令逮捕的过程,引发了关于报复受保护言论的指控,以及城镇在重大基础设施资金涌入时如何对待异议的质疑。
    content_file: a-farmer-arrested-for-going-5-seconds-over-his-time-limit-at.md
    summary: In Claremore, Oklahoma, resident Darren Blanchard was arrested for trespassing
      after speaking slightly past a three-minute public-comment limit at a February
      17 city council meeting about Project Mustang, a roughly 300-acre data center
      campus. Bodycam footage—obtained only after a fee dropped from $1,750 to $120—captured
      an officer ordering his arrest as he asked to submit documents, fueling claims
      of retaliation against protected speech and raising questions about how towns
      handle dissent when major infrastructure money arrives.
