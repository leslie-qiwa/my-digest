    summary: Sarah Wynn-Williams, a former Meta executive and author of the tell-all
      memoir "Careless People," has sued the company in federal court, arguing that
      the private arbitration order silencing her and her non-disparagement severance
      agreement are invalid and were signed under duress. She asks the court to lift
      the gag order and vacate the agreement, alleging Meta has surveilled her and
      threatened $50,000 in damages per violation to intimidate her and others from
      speaking out.
