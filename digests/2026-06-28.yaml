    summary_zh: 一项中国研究发现，奥泽匹克等GLP-1药物能通过一条独立于减重作用的肠道微生物通路逆转小鼠的抑郁样行为，这一作用依赖于德氏乳杆菌及其产生的内源性大麻素。由于抗抑郁益处源自特定肠道微生物，奥泽匹克的部分效果或许可通过富含纤维的饮食和酸奶等活性发酵食品部分实现。
    content_file: glp-1-drugs-led-to-weight-loss-and-reversed-depression-like.md
    summary: A Chinese study found that GLP-1 drugs like Ozempic reverse depression-like
      behavior in mice through a gut-microbe pathway that is separate from their weight-loss
      effect, depending on the bacterium Lactobacillus delbrueckii and its production
      of endocannabinoids. Because the antidepressant benefit traces back to specific
      gut microbes, some of Ozempic's effects may be partly achievable through fiber-rich
      diets and live ferments like yogurt.
