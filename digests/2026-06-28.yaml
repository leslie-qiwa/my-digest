  - url: https://jayacunzo.com/blog/your-move-chief
    title: Response to AI slop is from Robin Williams
    score: 93
    comment_cnt: 55
    comment_url: https://news.ycombinator.com/item?id=48703452
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 文章借用罗宾·威廉姆斯在《心灵捕手》公园长椅上的经典独白，指出人工智能与泛滥的网络建议只是"知道"——理论与信息，而人的真正价值来自亲身经历：爱、失去、战争与痛苦，这些都无法从书本中读到。作者呼吁读者不要被"无限知识"的喧嚣说服，从而否定自己亲历的经验与创作的声音，因为艺术正是把亲历的真理在内心转化为意义，而这只有独一无二的人才能创造。
    content_file: response-to-ai-slop-is-from-robin-williams.md
    summary: 'Using Robin Williams''s famous park-bench monologue from Good Will Hunting,
      the essay argues that AI and the flood of online advice represent mere "knowing"—theory
      and information—while real human worth comes from lived experience: love, loss,
      war, and pain that cannot be read in a book. It urges readers not to let the
      noise of infinite knowledge convince them their firsthand experiences and creative
      voice no longer matter, because art is the internal synthesis of lived truth
      into meaning that only a unique human can produce.'
  - url: https://github.com/kageroumado/adrafinil
    title: 'Show HN: Adrafinil – keep a lid-closed Mac awake only while agents work'
    score: 90
    comment_cnt: 55
    comment_url: https://news.ycombinator.com/item?id=48701512
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: Adrafinil 是一款 macOS 菜单栏应用，仅在 AI 编程代理处于活动会话时才阻止 Mac 睡眠（包括合盖睡眠），任务结束后系统即恢复正常睡眠。它将
      root 级睡眠控制隔离在一个微型、经过审计的辅助程序中，通过一键钩子集成九款代理，并具备引用计数断言、热保护切断和空闲释放等保护机制。
    content_file: show-hn-adrafinil-keep-a-lid-closed-mac-awake-only-while-age.md
    summary: Adrafinil is a macOS menu bar app that keeps a Mac awake—including with
      the lid closed—only while an AI coding agent has an active session, then lets
      the system sleep normally once the work finishes. It isolates root-level sleep
      control in a tiny audited helper, integrates via one-click hooks with nine agents,
      and includes safeguards like reference-counted assertions, a thermal cutout,
      and idle release.
  - url: https://danluu.com/discontinuities/
    title: Suspicious Discontinuities (2020)
    score: 199
    comment_cnt: 53
    comment_url: https://news.ycombinator.com/item?id=48698151
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 使用明确的数字门槛——如佩尔助学金收入线、p值上限、量刑重量、考试及格分以及青少年体育的年龄分组——会导致数据中出现"聚集"和断点,因为人们会刻意优化以落在有利的一侧。这些扭曲在收入、选举结果、拍卖价格、p值、毒品数量、考试分数和运动员出生日期的直方图中清晰可见,往往产生与政策初衷相反的结果,有时甚至能揭示彻底的造假。
    content_file: suspicious-discontinuities-2020.md
    summary: Using sharp numerical thresholds—such as the Pell Grant income cutoff,
      p-value limits, sentencing weights, exam pass marks, and youth-sports age cohorts—creates
      bunching and discontinuities in data because people optimize to land on the
      favorable side of the line. These distortions, visible in histograms of income,
      election results, auction prices, p-values, drug quantities, exam scores, and
      athlete birth dates, often produce outcomes opposite to the policy's intent
      and can even reveal outright fraud.
