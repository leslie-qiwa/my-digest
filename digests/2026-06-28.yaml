    summary_zh: 使用明确的数字门槛——如佩尔助学金收入线、p值上限、量刑重量、考试及格分以及青少年体育的年龄分组——会导致数据中出现"聚集"和断点,因为人们会刻意优化以落在有利的一侧。这些扭曲在收入、选举结果、拍卖价格、p值、毒品数量、考试分数和运动员出生日期的直方图中清晰可见,往往产生与政策初衷相反的结果,有时甚至能揭示彻底的造假。
    content_file: suspicious-discontinuities-2020.md
    summary: Using sharp numerical thresholds—such as the Pell Grant income cutoff,
      p-value limits, sentencing weights, exam pass marks, and youth-sports age cohorts—creates
      bunching and discontinuities in data because people optimize to land on the
      favorable side of the line. These distortions, visible in histograms of income,
      election results, auction prices, p-values, drug quantities, exam scores, and
      athlete birth dates, often produce outcomes opposite to the policy's intent
      and can even reveal outright fraud.
