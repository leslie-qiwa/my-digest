    tags: []
    summary_zh: 作者认为强迫性地看新闻就像抽烟一样，既伤害自己也伤害身边的人；他讲述了自己在2020年戒掉新闻后变得更平静、更快乐、也更让人愿意相处。他列举了戒新闻的理由：新闻让他感觉糟糕（甚至嗜血）、扭曲他对世界的认知、夸大了转瞬即逝的日常事件的重要性、把时间浪费在无意义的刷新上，而且常常完全错误。
    content_file: reading-the-news-is-the-new-smoking.md
    summary: 'The author argues that compulsively reading the news is like smoking—harmful
      to the consumer and to those around them—and recounts how quitting it in 2020
      made him calmer, happier, and better company. He lists his reasons: the news
      makes him feel terrible (even bloodthirsty), distorts his perception of reality,
      exaggerates the importance of fleeting daily events, wastes time on pointless
      checking, and is frequently just plain wrong.'
