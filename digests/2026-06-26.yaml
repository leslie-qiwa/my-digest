    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 一个研究团队开发了一种基于超声波的非侵入式脑接口，可透过完整颅骨对脑部神经血管血流成像，捕捉到他们称为迄今最详细的活体人脑血管图像——体积分辨率达到同类CT的100倍。他们利用FDA批准的微泡突破衍射极限，并将完整的处理流程与数据集开源，最终目标是借助更廉价的硬件和端到端机器学习实现无造影剂的神经血管成像。
    content_file: ultrasound-imaging-of-the-brain.md
    summary: A research team has developed a non-invasive ultrasound-based brain interface
      that images neurovascular blood flow through an intact skull, capturing what
      they claim is the most detailed vascular image of a living human brain to date—at
      100x the volumetric resolution of comparable CT. Using FDA-approved microbubbles
      to beat the diffraction limit, they are open-sourcing the full pipeline and
      dataset, with the ultimate goal of contrast-free neurovascular imaging powered
      by cheaper hardware and end-to-end machine learning.
