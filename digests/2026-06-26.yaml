    summary_zh: 一批主要的科技、金融和电信公司共同发起了 Akrites，称其为历史上规模最大的协调行动，旨在发现、修复并负责任地披露关键开源软件中的漏洞。该计划应对人工智能打破攻防平衡的局面，提供单一保密渠道，在上游与维护者协同修复，并将补丁部署而非公开披露作为成功标准。
    content_file: we-all-depend-on-open-source-we-will-defend-it-together.md
    summary: A coalition of major technology, finance, and telecom companies has launched
      Akrites, described as the largest coordinated effort in history to find, fix,
      and responsibly disclose vulnerabilities in critical open source software. The
      initiative responds to AI's collapse of the attacker-defender balance by providing
      a single confidential channel to coordinate remediation upstream with maintainers,
      prioritizing patch deployment over publication.
