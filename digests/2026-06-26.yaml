      patch, then honestly disclosed the LLM assistance when submitting it to emacs-devel.
      The patch was rejected under GNU's policy against LLM-assisted contributions,
      which the author argues is incoherent—punishing honesty rather than misuse—and
      has decided to stop contributing to Emacs as a result.
