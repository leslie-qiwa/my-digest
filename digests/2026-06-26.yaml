  - url: https://ohadravid.github.io/posts/2026-06-tool-talking/
    title: The Exhaustion of Talking to a Tool
    score: 57
    comment_cnt: 53
    comment_url: https://news.ycombinator.com/item?id=48687903
    source: Hacker News Hot Discussions
    tags: []
    summary_zh: 作者认为大语言模型令人疲惫，因为操作它们需要消耗对话所需的社交精力——协商、说服甚至动怒——却既没有键盘或汽车那种"身体延伸"般的工具魔力，也没有人际互动的真正回报。人们会以教导、挑战或启发来回馈你的社交投入，而大语言模型大多只是返回更多雷同的东西，这让人不禁要问：这份精力是否更该花在真实的同事身上。
    content_file: the-exhaustion-of-talking-to-a-tool.md
    summary: The author argues that LLMs are draining because they demand the social
      energy of conversation—negotiating, convincing, even getting angry—without delivering
      the bodily "tool magic" of a keyboard or car or the genuine rewards of human
      interaction. While people repay social effort by teaching, challenging, or inspiring
      you, LLMs mostly just return more of the same, raising the question of whether
      that energy would be better spent on real colleagues.
